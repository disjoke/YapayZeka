# Render.com — tek tık deploy
# https://dashboard.render.com → New → Blueprint → bu repo

services:
  - type: web
    name: ekinciler-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_REDIRECT_URI
        value: https://ekinciler-api.onrender.com/social/oauth/meta/callback
      - key: META_APP_REDIRECT
        value: ekinciler://oauth/meta
      - key: CORS_ORIGIN
        value: "*"
